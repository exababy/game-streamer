Section "ServerFlags"
    Option "AutoAddDevices" "false"
    Option "AutoAddGPU" "false"
    Option "AllowEmptyInput" "true"
    Option "DontVTSwitch" "true"
    Option "DRI2" "true"
EndSection

Section "Monitor"
    Identifier "Monitor0"
    HorizSync 30-120
    VertRefresh 50-75
    Option "DPMS" "false"
    ModeLine "1920x1080_60" 173.00 1920 2048 2248 2576 1080 1083 1088 1120 -hsync +vsync
EndSection

Section "Device"
    Identifier "Card0"
    Driver "nvidia"
    Option "ConnectedMonitor" "DFP-0"
    Option "UseDisplayDevice" "DFP-0"
    Option "CustomEDID" "DFP-0:/etc/X11/edid.bin"
    Option "IgnoreEDID" "false"
    Option "UseEDID" "true"
    Option "ModeValidation" "NoMaxPClkCheck, NoEdidMaxPClkCheck, NoMaxSizeCheck, NoHorizSyncCheck, NoVertRefreshCheck, NoVirtualSizeCheck"
EndSection

Section "Screen"
    Identifier "Screen0"
    Device "Card0"
    Monitor "Monitor0"
    DefaultDepth 24
    Option "AllowEmptyInitialConfiguration" "true"
    SubSection "Display"
        Depth 24
        Modes "1920x1080_60"
        Virtual 1920 1080
    EndSubSection
EndSection

Section "ServerLayout"
    Identifier "Layout0"
    Screen 0 "Screen0"
EndSection
