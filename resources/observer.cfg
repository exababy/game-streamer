//Crosshair//

cl_crosshair_drawoutline "1"
cl_crosshair_dynamic_maxdist_splitratio "0.35"
cl_crosshair_dynamic_splitalpha_innermod "1"
cl_crosshair_dynamic_splitalpha_outermod "0.5"
cl_crosshair_dynamic_splitdist "7"
cl_crosshair_outlinethickness "1"
cl_crosshairalpha "255"
cl_crosshaircolor "5"
cl_crosshaircolor_b "255"
cl_crosshaircolor_g "255"
cl_crosshaircolor_r "255"
cl_crosshairdot "0"
cl_crosshairgap "-1"
cl_crosshairgap_useweaponvalue "0"
cl_crosshairsize "4"
cl_crosshairstyle "4"
cl_crosshairthickness "1"
cl_crosshairusealpha "1"
cl_crosshair_t 0
cl_crosshair_recoil 0

 // Viewmodel //

viewmodel_fov "70"
viewmodel_offset_x "2"
viewmodel_offset_y "2"
viewmodel_offset_z "-2"


//Volume//
volume ".25"
snd_musicvolume "0.000000"



//HUD//
hud_scaling "0.85"
cl_spec_show_bindings "0"    //Removes key bindings under player names
cl_spec_stats "0"    //Removes KDA stats under player names. Usually these stats are inaccurate and don't reflect what's shown on the scoreboard (includes warm-up, etc)
cl_hud_color "1"     //HUD color may vary based on stream branding
cl_chatfilters 0 // hides EVERYTHING in chat
cl_spec_use_tournament_content_standards 1 // removes skin tags
cl_teammate_colors_show 0

//Custom HUD
cl_draw_only_deathnotices 1
//cl_drawhud_force_radar 1


//Safezone (for TV/Twitch)
//safezonex 0.995
//safezoney 0.96 //Safezone commands were specifically recommended by Valve at the Major
//safezonex 0.95 // remove this for TV
safezonex 0.988 // adjust for my own hud
safezoney 0.92 // adjust to my own hud




//Radar//
cl_radar_always_centered "0"
cl_radar_scale "0.5"
cl_hud_radar_scale "1.15"
cl_radar_icon_scale_min "1"
cl_radar_rotate "1"


cl_obs_interp_enable 0 // smooth spectating
r_show_build_info false
r_csgo_postprocess_enable true
cl_sanitize_muted_players false // Auto-Muted Players
spec_autodirector false
// `spec_usenumberkeys_nobinds 1` is CS2's "auto-bind 1..0 to spec slots
// even if the user hasn't bound them" mode. We used to set this to 0,
// which suppresses that fallback — and because cs2's default `1` bind
// is conditional on this convar, slots 1..10 silently stopped working
// while 11/12 (explicitly bound to `-`/`=` below) kept working.
// Keep it on so digit-row binds survive any future cs2 default churn,
// AND set explicit binds below as belt-and-suspenders.
spec_usenumberkeys_nobinds 1
cl_hud_telemetry_frametime_show 0
cl_hud_telemetry_ping_show 0
cl_hud_telemetry_net_misdelivery_show 0

bind "uparrow" "volume .25"
bind "downarrow" "volume 0"


// Spec slot binds. spectator/server.mjs `/spec/slot` sends one of these
// digit keysyms via xdotool — keep them explicit so we don't depend on
// cs2's default observer config (which uses `spec_player_by_index`
// with 0-based slots and gets disabled by `spec_usenumberkeys_nobinds 0`).
// Slot N here = `spec_player N` (1-based, matches the api/web slot ids).
bind "1" "spec_player 1"
bind "2" "spec_player 2"
bind "3" "spec_player 3"
bind "4" "spec_player 4"
bind "5" "spec_player 5"
bind "6" "spec_player 6"
bind "7" "spec_player 7"
bind "8" "spec_player 8"
bind "9" "spec_player 9"
bind "0" "spec_player 10"
bind "-" "spec_player 11"
bind "=" "spec_player 12"
