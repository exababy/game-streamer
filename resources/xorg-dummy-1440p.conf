Section "ServerFlags"
    Option "AutoAddDevices" "false"
    Option "AutoAddGPU" "false"
    Option "AllowEmptyInput" "true"
    Option "DontVTSwitch" "true"
    Option "DRI2" "true"
EndSection

Section "Monitor"
    Identifier "Monitor0"
    HorizSync 30-120
    VertRefresh 50-75
    Option "DPMS" "false"
    ModeLine "2560x1440_60" 312.25 2560 2752 3024 3488 1440 1443 1448 1493 -hsync +vsync
EndSection

Section "Device"
    Identifier "Card0"
    Driver "nvidia"
    Option "ConnectedMonitor" "DFP-0"
    Option "UseDisplayDevice" "DFP-0"
    Option "CustomEDID" "DFP-0:/etc/X11/edid.bin"
    Option "IgnoreEDID" "false"
    Option "UseEDID" "true"
    Option "ModeValidation" "NoMaxPClkCheck, NoEdidMaxPClkCheck, NoMaxSizeCheck, NoHorizSyncCheck, NoVertRefreshCheck, NoVirtualSizeCheck"
EndSection

Section "Screen"
    Identifier "Screen0"
    Device "Card0"
    Monitor "Monitor0"
    DefaultDepth 24
    Option "AllowEmptyInitialConfiguration" "true"
    SubSection "Display"
        Depth 24
        Modes "2560x1440_60"
        Virtual 2560 1440
    EndSubSection
EndSection

Section "ServerLayout"
    Identifier "Layout0"
    Screen 0 "Screen0"
EndSection
